services:
  - type: web
    runtime: static
    name: zk-acq-presentatie-v3
    repo: https://github.com/ontwikkeling-del/zk-acq-presentatie-v3
    buildCommand: PUPPETEER_SKIP_DOWNLOAD=true npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
